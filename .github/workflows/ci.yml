name: CI Pipelines
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - name: Install dependencies
        run: pip install -r course_10/AIEngineerModelPackaging/requirements.txt
      - name: Run tests
        run: pytest course_10/AIEngineerModelPackaging/tests